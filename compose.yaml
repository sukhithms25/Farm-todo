name: todo-app

services:
  nginx:
    image: nginx:1.25
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8000:80"
    depends_on:
      - frontend
      - backend
    command: /bin/sh -c "sleep 20 && nginx -g 'daemon off;'"

  frontend:
    image: node:22
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && CHOKIDAR_USEPOLLING=true WATCHPACK_POLLING=true npm start"
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=3000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_PORT=0
    stdin_open: true
    tty: true
    expose:
      - "3000"

  backend:
    build: ./backend
    image: todo-app/backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: python src/server.py
    environment:
      - DEBUG=true
    env_file:
      - .env
    expose:
      - "3001"